<style>
  #threejs-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }

  /* Slightly transparent content background */
  .page, .post-content {
    background-color: rgba(var(--body-bg-rgb), 0.92);
  }
</style>

<div id="threejs-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Scene setup with visible background
    const container = document.getElementById('threejs-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    // Make renderer clearly visible
    const renderer = new THREE.WebGLRenderer({
      alpha: false, // Changed to false to show background
      antialias: true
    });
    renderer.setClearColor(0x000000, 0); // Transparent background
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // 2. More visible geometry
    const geometry = new THREE.IcosahedronGeometry(1.5, 1); // Larger and more detailed
    const material = new THREE.MeshBasicMaterial({ 
      color: 0x1DB954, // Vibrant Spotify green
      wireframe: true,
      wireframeLinewidth: 2 // Thicker lines
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Add second mesh for more visual interest
    const mesh2 = new THREE.Mesh(
      new THREE.TorusKnotGeometry(0.8, 0.3, 100, 16),
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true
      })
    );
    scene.add(mesh2);

    camera.position.z = 4;

    // 3. Animation with different rotation speeds
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.008;
      mesh2.rotation.x -= 0.003;
      mesh2.rotation.z += 0.005;
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  });
</script>
