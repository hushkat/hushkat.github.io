<style>
  #threejs-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.15; /* Reduced opacity for better content visibility */
    pointer-events: none;
  }

  /* Content protection for Chirpy theme */
  .page, .post-content {
    background-color: rgba(var(--body-bg-rgb), 0.85) !important;
    position: relative; /* Ensures content stays above canvas */
  }

  /* Dark mode adjustment */
  @media (prefers-color-scheme: dark) {
    #threejs-container {
      opacity: 0.1; /* Even more subtle in dark mode */
    }
  }
</style>

<div id="threejs-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Optimized scene setup
    const container = document.getElementById('threejs-container');
    const scene = new THREE.Scene();
    scene.background = null; // Fully transparent background
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    const renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: true,
      powerPreference: "low-power" // Better for mobile
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Performance balance
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // 2. Lighter-weight geometry
    const geometry = new THREE.OctahedronGeometry(1, 1); // Simpler than icosahedron
    const material = new THREE.MeshBasicMaterial({ 
      color: 0x1DB954, // Spotify green
      wireframe: true,
      transparent: true,
      opacity: 0.7
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    camera.position.z = 3;

    // 3. Optimized animation loop
    let lastTime = 0;
    const animationSpeed = 0.3; // Slower rotation
    
    function animate(currentTime) {
      requestAnimationFrame(animate);
      
      // Smooth, frame-rate independent animation
      if (!lastTime) lastTime = currentTime;
      const delta = (currentTime - lastTime) * 0.001;
      lastTime = currentTime;
      
      mesh.rotation.x += 0.002 * delta * 60 * animationSpeed;
      mesh.rotation.y += 0.004 * delta * 60 * animationSpeed;
      
      renderer.render(scene, camera);
    }
    animate();

    // 4. Debounced resize handler
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, 100);
    });
  });
</script>
