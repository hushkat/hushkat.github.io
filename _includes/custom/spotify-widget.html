<style>
  #spotify-widget {
    padding: 1rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 0.5rem;
    margin: 1.5rem 0;
    font-size: 0.9rem;
  }
  #now-playing {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.8rem;
  }
  #connect-spotify {
    background: #1DB954;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
</style>

<div id="spotify-widget">
  <div id="now-playing">
    Connect to see your current track
  </div>
  <button id="connect-spotify">Connect Spotify</button>
</div>

<script>
  document.getElementById('connect-spotify').addEventListener('click', function() {
    // Use your EXACT production URL
    const redirectUri = 'https://hushkat.github.io/'; // Must match Spotify dashboard exactly
    
    const clientId = 'c82b53ff2c26448896e6c9301fd36a20';
    const scopes = 'user-read-currently-playing';
    
    const authUrl = new URL('https://accounts.spotify.com/authorize');
    authUrl.searchParams.append('response_type', 'token');
    authUrl.searchParams.append('client_id', clientId);
    authUrl.searchParams.append('scope', scopes);
    authUrl.searchParams.append('redirect_uri', redirectUri);
    authUrl.searchParams.append('show_dialog', 'true');
    
    window.location = authUrl.toString();
  });

  // Handle the callback when returning from Spotify
  if (window.location.hash.includes('access_token')) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get('access_token');
    localStorage.setItem('spotify_token', token);
    
    // Clean the URL
    window.history.pushState({}, '', window.location.pathname);
    
    // Now fetch and display the current track
    fetchNowPlaying();
  }

  async function fetchNowPlaying() {
    const token = localStorage.getItem('spotify_token');
    if (!token) return;
    
    try {
      const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        const data = await response.json();
        document.getElementById('now-playing').innerHTML = `
          <img src="${data.item.album.images[1].url}" width="64" height="64">
          <div>
            <strong>${data.item.name}</strong><br>
            ${data.item.artists.map(a => a.name).join(', ')}
          </div>`;
      }
    } catch (error) {
      console.error('Error:', error);
    }
  }
</script>
