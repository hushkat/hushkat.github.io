layout: home
---
<style>
  #threejs-bg {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    z-index: 999 !important;  /* Temporarily bring to front */
    pointer-events: none !important;
    background-color: rgba(255, 0, 0, 0.3) !important;  /* Red overlay to see if div exists */
  }
  
  #threejs-bg canvas {
    display: block !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    z-index: 1000 !important;  /* Bring canvas to very front */
  }
</style>

<div id="threejs-bg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    console.log('Starting Three.js animation...');
    
    const container = document.getElementById('threejs-bg');
    console.log('Container found:', container);
    
    if (!container) {
      console.error('Container #threejs-bg not found!');
      return;
    }
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 3;
    
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false
    });
    renderer.setClearColor(0x001122, 1);  // Dark blue background
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    console.log('Canvas element:', renderer.domElement);
    container.appendChild(renderer.domElement);
    console.log('Canvas added to container');
    
    const geometry = new THREE.IcosahedronGeometry(1, 1);
    const material = new THREE.MeshBasicMaterial({
      color: 0x1DB954,
      wireframe: true,
      wireframeLinewidth: 2
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.008;
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('Animation started successfully');
    
    // Test: Add a visible element to the container
    const testDiv = document.createElement('div');
    testDiv.style.cssText = `
      position: absolute;
      top: 50px;
      left: 50px;
      width: 200px;
      height: 100px;
      background: yellow;
      z-index: 2000;
      color: black;
      padding: 10px;
      font-size: 16px;
    `;
    testDiv.textContent = 'TEST: Can you see this yellow box?';
    container.appendChild(testDiv);
  });
</script>
