<div id="test-div" style="position: fixed; top: 50px; left: 50px; width: 200px; height: 100px; background: red; z-index: 9999; color: white; padding: 10px;">
  TEST DIV - Can you see this?
</div>

<script>
  console.log('Script is running!');
  
  // Add content after page loads
  window.addEventListener('load', function() {
    console.log('Page fully loaded');
    
    // Test if we can modify the page
    document.getElementById('test-div').innerHTML = 'SCRIPT WORKED!';
    
    // Try adding the Three.js container
    const container = document.createElement('div');
    container.id = 'threejs-bg';
    container.style.cssText = `
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: blue;
      pointer-events: none;
    `;
    document.body.appendChild(container);
    
    console.log('Container added to body');
  });
</script>
