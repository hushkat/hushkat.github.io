layout: home

<style>
  #threejs-bg {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    z-index: -1 !important;
    pointer-events: none !important;
  }
  
  #threejs-bg canvas {
    display: block !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
  }
  
  /* Make content background semi-transparent */
  .main-content, #main, .container, .post-content {
    background-color: rgba(255, 255, 255, 0.9) !important;
    position: relative !important;
    z-index: 1 !important;
  }
  
  /* Test visibility - remove this after confirming it works */
  #threejs-bg {
    border: 2px solid red !important;
  }
</style>

<div id="threejs-bg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    console.log('Starting Three.js animation...');
    
    const container = document.getElementById('threejs-bg');
    if (!container) {
      console.error('Container #threejs-bg not found!');
      return;
    }
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 3;
    
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false  // Changed to false to make background visible
    });
    renderer.setClearColor(0x001122, 1);  // Dark blue background instead of transparent
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);
    
    console.log('Canvas created and added to container');
    
    const geometry = new THREE.IcosahedronGeometry(1, 1);
    const material = new THREE.MeshBasicMaterial({
      color: 0x1DB954,
      wireframe: true,
      wireframeLinewidth: 2
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.008;
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('Animation started successfully');
  });
</script>
